<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Usuarios del Sistema</h4>
    <button class="btn btn-primary btn-sm" (click)="goToForm()">
      ➕ Nuevo Usuario
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Usuario</th>
            <th>Nombre Completo</th>
            <th>Perfil</th>
            <th>Última Conexión</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuarios">
            <td class="text-muted">{{ u.id_usuario }}</td>
            <td class="fw-semibold">{{ u.nombre_usuario }}</td>
            <td>{{ u.nombre_completo || '—' }}</td>
            <td>
              <span
                class="badge"
                [class.bg-warning]="u.perfil === 'admin'"
                [class.text-dark]="u.perfil === 'admin'"
                [class.bg-secondary]="u.perfil !== 'admin'"
              >
                {{ u.perfil || 'Sin perfil' }}
              </span>
            </td>
            <td class="text-muted small">{{ u.ultima_conexion ? (u.ultima_conexion | date:'dd/MM/yyyy HH:mm') : 'Nunca' }}</td>
            <td class="text-end">
              <button
                class="btn btn-outline-danger btn-sm"
                (click)="eliminar(u)"
              >
                🗑️ Eliminar
              </button>
            </td>
          </tr>
          <tr *ngIf="usuarios.length === 0">
            <td colspan="6" class="text-center text-muted py-4">No hay usuarios registrados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
