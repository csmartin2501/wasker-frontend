<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img class="login-logo" src="assets/logo_gatobarato.png" alt="Wasker Logo">
      <h1>Wasker</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Tu nombre de usuario"
          [class.input-error]="username?.invalid && username?.touched"
        />
        <span class="error-text" *ngIf="username?.invalid && username?.touched">
          <span *ngIf="username?.errors?.['required']">El nombre de usuario es requerido.</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span class="error-text" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">La contraseña es requerida.</span>
          <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres.</span>
        </span>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar sesión</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>

    </form>
  </div>
</div>
