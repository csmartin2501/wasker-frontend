<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Categorías de Productos</h4>
    <button class="btn btn-primary btn-sm" (click)="openForm()">
      ➕ Nueva Categoría
    </button>
  </div>

  <!-- Formulario inline -->
  <div *ngIf="showForm" class="card shadow-sm mb-4" style="max-width: 500px;">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">{{ editId ? 'Editar' : 'Nueva' }} Categoría</span>
      <button type="button" class="btn-close" (click)="closeForm()"></button>
    </div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre *</label>
          <input
            type="text"
            class="form-control"
            formControlName="categoria_producto"
            placeholder="Ej: Alimento seco adulto"
            [class.is-invalid]="f['categoria_producto'].invalid && f['categoria_producto'].touched"
          >
          <div class="invalid-feedback">El nombre es requerido.</div>
        </div>

        <div class="mb-3 d-flex gap-4">
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="chkAdulto"
              formControlName="es_categoria_adulto"
            >
            <label class="form-check-label" for="chkAdulto">Categoría Adulto</label>
          </div>
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="chkGatito"
              formControlName="es_categoria_gatito"
            >
            <label class="form-check-label" for="chkGatito">Categoría Gatito</label>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-sm">
            {{ editId ? 'Guardar cambios' : 'Crear' }}
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="closeForm()">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- Tabla -->
  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Categoría</th>
            <th class="text-center">Adulto</th>
            <th class="text-center">Gatito</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cat of categorias">
            <td class="text-muted">{{ cat.id_producto_categoria }}</td>
            <td class="fw-semibold">{{ cat.categoria_producto }}</td>
            <td class="text-center">
              <span *ngIf="cat.es_categoria_adulto" class="badge bg-info">Adulto</span>
              <span *ngIf="!cat.es_categoria_adulto" class="text-muted">—</span>
            </td>
            <td class="text-center">
              <span *ngIf="cat.es_categoria_gatito" class="badge bg-success">Gatito</span>
              <span *ngIf="!cat.es_categoria_gatito" class="text-muted">—</span>
            </td>
            <td class="text-end">
              <button class="btn btn-outline-primary btn-sm me-1" (click)="openForm(cat)">✏️ Editar</button>
              <button class="btn btn-outline-danger btn-sm" (click)="eliminar(cat)">🗑️ Eliminar</button>
            </td>
          </tr>
          <tr *ngIf="categorias.length === 0">
            <td colspan="5" class="text-center text-muted py-4">No hay categorías registradas</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
